services:
  postgres:
    image: postgres:15
    container_name: lumina_postgres
    restart: always
    environment:
      POSTGRES_USER: lumina_user
      POSTGRES_PASSWORD: lumina_pass
      POSTGRES_DB: lumina_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && python -m app.main"
    environment:
      DATABASE_URL: postgresql://lumina_user:lumina_pass@postgres:5432/lumina_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
