services:
  postgres:
    image: postgres:15
    container_name: lumina_postgres
    restart: always
    environment:
      POSTGRES_USER: lumina_user
      POSTGRES_PASSWORD: lumina_pass
      POSTGRES_DB: lumina_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql://lumina_user:lumina_pass@postgres:5432/lumina_db
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
