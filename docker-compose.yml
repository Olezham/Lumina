services:
    postgres:
        image: postgres:15
        container_name: lumina_postgres
        restart: always
        environment:
            POSTGRES_USER: lumina_user
            POSTGRES_PASSWORD: lumina_pass
            POSTGRES_DB: lumina_db
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
